kind = "mobile"
previewPath = "/"
title = "Cornell Notes"
version = "1.0.0"
id = "artifacts/cornell-notes"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24327

[services.development]
run = "pnpm --filter @workspace/cornell-notes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cornell-notes", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/cornell-notes", "run", "serve" ]

[services.env]
PORT = "24327"
BASE_PATH = "/"
